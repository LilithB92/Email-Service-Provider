{% extends 'base.html' %}

{% block title %}{{object.name}}{% endblock %}

{% block content %}
<div class = "container">
    <div class="row justify-content-center">
       <div class="card bg-dark text-white" style="width: 24rem;">
          <div class="card-body">
            <h5 class="card-title  text-center">Имя: {{object.full_name}}</h5>
            <p class="card-text">Комментарий: {{object.post}}</p>
            <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                  <a href="{%  url 'mailing:recipient_list' %}" class="btn btn-sm btn-outline-primary" >Назад</a>
                  {% if product.owner == user %}
                      <a href="#"  class="btn btn-sm btn-outline-secondary">
                        Редактировать
                      </a>
                      <a href="#"  class="btn btn-sm btn-outline-danger">
                        Удалить
                      </a>
                  {% endif %}
                </div>
              </div>
          </div>
       </div>
    </div>
</div>

{% endblock %}
