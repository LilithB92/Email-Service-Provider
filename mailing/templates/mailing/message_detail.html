{% extends 'base.html' %}

{% block title %}{{object.subject}}{% endblock %}

{% block content %}
<div class = "container">
    <div class="row justify-content-center">
       <div class="card bg-dark text-white" style="width: 24rem;">
          <div class="card-body">
            <h5 class="card-title  text-center">Тема письма: {{object.subject}}</h5>
            <p class="card-text">Тело письма: {{object.text}}</p>
            <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                  <a href="{%  url 'mailing:message_list' %}" class="btn btn-sm btn-outline-primary" >Назад</a>
                  <a href="{%  url 'mailing:message_update' message.pk %}"  class="btn btn-sm btn-outline-secondary">
                    Редактировать
                  </a>
                  <a href="{%  url 'mailing:message_delete' message.pk %}""  class="btn btn-sm btn-outline-danger">
                    Удалить
                  </a>
                </div>
              </div>
          </div>
       </div>
    </div>
</div>

{% endblock %}
