{% extends 'base.html' %}
{% block title %}Удаление клиента{% endblock %}
{% block header %}{% endblock %}
{% block content %}
<div class="container mt-5">
        <h1 class="mb-4">Удалить объект клиента</h1>
        <p>Вы уверены, что хотите удалить "{{object.full_name}}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{%  url 'mailing:recipient_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
</div>
{% endblock %}
