{% extends 'base.html' %}
{% block title %}Рассылка{% endblock %}
{% block header %}{% endblock %}
{% block content %}
<div class="container ">
    <div class="row">
        <div class=" col-12 d-flex justify-content-center">
            <form class="row" method="post" enctype="multipart/form-data">
                <div class="card bg-dark text-white">
                    <div class="card-body">
                        {% csrf_token %}
                        {{ form.as_p}}
                    </div>
                     <div class="btn-group">
                        <button type="submit" class="btn btn-sm  btn btn-primary">
                            {% if object %}
                                Сохранить
                            {% else %}
                                Создать
                            {% endif%}
                        </button>
                        <a href="{%  url 'mailing:mailing_list' %}"  class="btn btn-sm  btn btn-secondary"> Назад</a>
                     </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
